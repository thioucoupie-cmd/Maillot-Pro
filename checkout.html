<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2a5a3b",
                        "background-dark": "#111111",
                        "charcoal": "#1a1a1a",
                        "off-white": "#f5f5f5",
                        "light-gray": "#a1a1aa"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #111111;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #2a5a3b;
        }
    </style>
</head>
<body class="bg-background-dark text-off-white font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl bg-background-dark overflow-x-hidden">
<!-- Sticky Header -->
<header class="sticky top-0 z-50 flex items-center bg-background-dark/90 backdrop-blur-md p-4 border-b border-white/5 justify-between">
<div class="text-off-white flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h1 class="text-off-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Maillot Pro</h1>
<div class="flex w-10 items-center justify-end">
<span class="material-symbols-outlined text-xl text-primary">lock</span>
</div>
</header>
<main class="flex-1 pb-44">
<!-- Order Summary Card -->
<div class="p-4">
<div class="flex items-center gap-4 rounded-xl bg-[#1a1a1a] p-4 shadow-sm border border-white/5">
<div class="h-24 w-20 bg-center bg-no-repeat bg-cover rounded-lg flex-shrink-0" data-alt="Premium white and gold football jersey detail" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDKYP0joFbFOCslhhvBAwdQ9gCjI0oetgPpN3jEpqH865vDPd6rpWNXGk1BAX5Kqjo_fC1sKw1WmsHLmyFz_hq41Kai9AtoB6FipcEfRQQz7BiMCA3Bc017LK2XJZhU3YtRY3rEU0CrYG5z371NK8I-mf8YE3_O7SQBOmaP1o7uS9SzvbxGAHHIWJr0M8_vpHtGB4ArDzlC_celypYxXTOPh9CKNxFAgK-fG95NxwGUVOnuB_QoNHk_xaIxui8ZGwIRbnLnLCCbIWA");'>
</div>
<div class="flex flex-col flex-1">
<div class="flex justify-between items-start">
<p class="text-off-white text-base font-bold">Premium Pro Jersey</p>
<p class="text-off-white font-bold">$120.00</p>
</div>
<p class="text-light-gray text-xs font-medium mt-1">Size: Medium | Edition: Elite</p>
<div class="mt-2 flex items-center justify-between">
<span class="text-xs text-zinc-500">Qty: 1</span>
<span class="text-xs font-bold text-primary">Edit</span>
</div>
</div>
</div>
</div>
<!-- Express Checkout Section -->
<div class="px-4 py-2">
<h2 class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-4 px-1">Express Checkout</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Apple Pay Style Button (White on Dark) -->
<button class="flex items-center justify-center gap-2 rounded-lg h-12 bg-white text-black font-bold text-sm transition-opacity hover:opacity-90">
<span class="material-symbols-outlined text-xl">ios</span>
                    Pay
                </button>
<!-- Google Pay Style Button (Dark on Dark) -->
<button class="flex items-center justify-center gap-2 rounded-lg h-12 bg-[#1a1a1a] border border-white/10 text-white font-bold text-sm shadow-sm">
<span class="material-symbols-outlined text-xl text-white">google</span>
                    Pay
                </button>
</div>
</div>
<!-- Divider -->
<div class="relative flex py-8 items-center px-4">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Or pay with card</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Checkout Form -->
<form class="px-4 space-y-6">
<!-- Shipping Information -->
<div class="space-y-4">
<h3 class="text-off-white text-sm font-bold px-1">Shipping Information</h3>
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="email" placeholder="Email Address" type="email"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="email">Email Address</label>
</div>
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="name" placeholder="Full Name" type="text"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="name">Full Name</label>
</div>
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="address" placeholder="Delivery Address" type="text"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="address">Delivery Address</label>
</div>
</div>
<!-- Payment Details -->
<div class="space-y-4 pt-4">
<div class="flex items-center justify-between px-1">
<h3 class="text-off-white text-sm font-bold">Secure Card Payment</h3>
<span class="material-symbols-outlined text-primary text-lg">verified_user</span>
</div>
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="card" placeholder="Card Number" type="text"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="card">Card Number</label>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
<span class="material-symbols-outlined text-zinc-600">credit_card</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="expiry" placeholder="MM / YY" type="text"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="expiry">MM / YY</label>
</div>
<div class="relative floating-label-input">
<input class="block w-full px-4 pt-6 pb-2 text-off-white bg-[#1a1a1a] border border-white/10 rounded-lg appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary peer placeholder-transparent" id="cvc" placeholder="CVC" type="text"/>
<label class="absolute text-sm text-zinc-500 duration-300 transform -translate-y-3 scale-85 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-3" for="cvc">CVC</label>
</div>
</div>
</div>
</form>
</main>
<!-- Fixed Footer -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1a1a1a]/95 backdrop-blur-md border-t border-white/5 p-4 pb-6 space-y-4 shadow-[0_-8px_30px_rgb(0,0,0,0.5)]">
<div class="flex justify-between items-center mb-2 px-1">
<span class="text-zinc-500 font-medium text-sm">Total Price</span>
<span class="text-off-white text-2xl font-bold">$120.00</span>
</div>
<button class="w-full h-16 bg-primary text-white font-bold rounded-xl flex items-center justify-center gap-3 hover:bg-opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="text-lg">Pay Now</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<div class="flex justify-center items-center gap-6 opacity-30 grayscale invert">
<span class="material-symbols-outlined text-xl">payments</span>
<span class="material-symbols-outlined text-xl">account_balance</span>
<span class="material-symbols-outlined text-xl">security</span>
<span class="text-[9px] font-bold tracking-tighter">SSL SECURE</span>
</div>
</footer>
</div>
</body></html>
